<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Comparison Pro — Premium Tool | Los Santos Guide</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>" />
    <meta property="og:title" content="GTA Vehicle Comparison Tool — Premium" />
    <meta property="og:description" content="Side-by-side vehicle comparison with performance charts. Premium tool." />
    <style>
        .premium-page {
            margin-top: var(--header-h);
            min-height: calc(100vh - var(--header-h));
        }
        .premium-hero {
            text-align: center;
            padding: 60px 24px 40px;
            border-bottom: 1px solid var(--border);
        }
        .premium-hero .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(251,177,60,0.12);
            color: var(--orange);
            margin-bottom: 12px;
        }
        .premium-hero h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 2px;
        }
        .premium-hero p { color: var(--text-muted); margin-top: 8px; }

        /* Tool */
        .tool-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }
        .compare-controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            align-items: end;
        }
        .compare-controls .field { flex: 1; min-width: 180px; }
        .compare-controls label {
            display: block;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
        }
        .compare-controls select {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
        }
        .compare-controls select:focus { border-color: var(--orange); }
        .compare-controls select option { background: var(--bg-primary); }

        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }
        .compare-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
        }
        .compare-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
        .compare-card .spec {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
        }
        .compare-card .spec:last-child { border-bottom: none; }
        .compare-card .spec .label { color: var(--text-muted); }
        .compare-card .spec .value { font-weight: 600; }
        .compare-card .spec .winner { color: var(--green); }

        /* Simple bar chart */
        .bar-chart { margin-top: 16px; }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .bar-row .bar-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            min-width: 70px;
            text-align: right;
        }
        .bar-row .bar-track {
            flex: 1;
            height: 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }
        .bar-row .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width .6s ease;
        }
        .bar-fill.c1 { background: linear-gradient(90deg, var(--orange), var(--orange-deep)); }
        .bar-fill.c2 { background: linear-gradient(90deg, var(--blue), #4fc3f7); }
        .bar-row .bar-val {
            font-size: 0.78rem;
            font-weight: 600;
            min-width: 30px;
        }

        /* Gate overlay */
        .gate-overlay {
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .gate-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .gate-card .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
        .gate-card h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
        .gate-card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 20px; }
        .gate-card .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .gate-card .demo-link {
            font-size: 0.82rem;
            color: var(--text-muted);
            cursor: pointer;
            margin-top: 16px;
            display: inline-block;
        }
        .gate-card .demo-link:hover { color: var(--text-primary); }

        @media (max-width: 700px) {
            .compare-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="container">
        <a href="../index.html" class="logo"><span class="ls">LS</span><span class="cn">Guide</span></a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../online/index.html">GTA Online</a></li>
            <li><a href="../gta6/index.html">GTA6</a></li>
            <li><a href="../news/index.html">News</a></li>
            <li><a href="../store/index.html" class="active">Store</a></li>
            <li><a href="../search.html">Search</a></li>
        </ul>
        <div class="search-box">
            <span class="icon">&#128269;</span>
            <input type="text" id="search-input" placeholder="Search guides&hellip;" />
        </div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#127769;</button>
        <button class="mobile-toggle">&#9776;</button>
    </div>
</header>

<div class="premium-page">
    <div class="premium-hero">
        <span class="badge">&#127942; Premium Tool</span>
        <h1>&#128664; Vehicle Comparison Pro</h1>
        <p>Compare any two vehicles side-by-side with performance charts and detailed specs.</p>
    </div>

    <div class="tool-wrap">
        <div class="compare-controls">
            <div class="field">
                <label>Vehicle 1</label>
                <select id="v1-select">
                    <option value="">Select vehicle...</option>
                </select>
            </div>
            <div class="field">
                <label>Vehicle 2</label>
                <select id="v2-select">
                    <option value="">Select vehicle...</option>
                </select>
            </div>
        </div>

        <div class="compare-grid" id="compare-results">
            <div class="compare-card">
                <h3 id="v1-name">Vehicle 1</h3>
                <div id="v1-specs">
                    <p style="color:var(--text-muted);font-size:0.88rem;">Select a vehicle above</p>
                </div>
                <div class="bar-chart" id="v1-chart"></div>
            </div>
            <div class="compare-card">
                <h3 id="v2-name">Vehicle 2</h3>
                <div id="v2-specs">
                    <p style="color:var(--text-muted);font-size:0.88rem;">Select a vehicle above</p>
                </div>
                <div class="bar-chart" id="v2-chart"></div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>Los Santos Guide &copy; 2026</p>
    </div>
</footer>

<script src="../js/nav.js"></script>
<script>
/* ==========================================
   Premium Gate — checks if user has access
   ========================================== */
(function() {
    const hasAccess = localStorage.getItem('lsg_premium') === 'true';
    const GATE_KEY = 'lsg_premium_demo';

    // Demo mode: click "Try Demo" 3 times to unlock
    let demoClickCount = parseInt(localStorage.getItem(GATE_KEY) || '0');

    if (!hasAccess && demoClickCount < 3) {
        const overlay = document.createElement('div');
        overlay.className = 'gate-overlay';
        overlay.id = 'gate';
        overlay.innerHTML = `
            <div class="gate-card">
                <span class="icon">&#128274;</span>
                <h2>Premium Feature</h2>
                <p>Vehicle Comparison Pro is available exclusively to Los Santos Guide Premium members. Upgrade to unlock interactive charts, detailed specs, and more.</p>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="window.location.href='./index.html'">View Plans</button>
                    <button class="btn btn-outline" id="demo-btn">Try Demo</button>
                </div>
                <span class="demo-link" id="demo-count">Click "Try Demo" 3 times to preview</span>
            </div>
        `;
        document.body.appendChild(overlay);

        document.getElementById('demo-btn').addEventListener('click', function() {
            demoClickCount++;
            localStorage.setItem(GATE_KEY, String(demoClickCount));
            const remaining = 3 - demoClickCount;
            if (remaining > 0) {
                document.getElementById('demo-count').textContent = remaining + ' more click' + (remaining > 1 ? 's' : '') + ' to preview';
            } else {
                document.getElementById('gate').remove();
            }
        });
    }
})();

/* ==========================================
   Vehicle Data & Comparison Engine
   ========================================== */
const vehicles = [
    { name: 'Ocelot Virtue', speed: 96, accel: 90, braking: 85, handling: 88, price: '$2,875,000', class: 'Super' },
    { name: 'Grotti Itali RSX', speed: 98, accel: 92, braking: 83, handling: 86, price: '$3,625,000', class: 'Super' },
    { name: 'Pfister 811', speed: 97, accel: 85, braking: 78, handling: 72, price: '$1,135,000', class: 'Super' },
    { name: 'Progen Emerus', speed: 95, accel: 91, braking: 88, handling: 87, price: '$2,750,000', class: 'Super' },
    { name: 'Annis RE-7B', speed: 93, accel: 86, braking: 82, handling: 84, price: '$2,475,000', class: 'Super' },
    { name: 'Dewbauchee Vagner', speed: 92, accel: 88, braking: 86, handling: 90, price: '$1,530,000', class: 'Super' },
    { name: 'Nero Custom', speed: 92, accel: 85, braking: 80, handling: 78, price: '$2,440,000', class: 'Super' },
    { name: 'Benefactor Krieger', speed: 94, accel: 90, braking: 89, handling: 91, price: '$2,850,000', class: 'Super' },
    { name: 'Ocelot Pariah', speed: 90, accel: 87, braking: 80, handling: 82, price: '$1,420,000', class: 'Sports' },
    { name: 'Grotti Itali GTO', speed: 89, accel: 92, braking: 84, handling: 80, price: '$1,965,000', class: 'Sports' },
    { name: 'Pfister Comet SR', speed: 88, accel: 86, braking: 81, handling: 83, price: '$1,215,000', class: 'Sports' },
    { name: 'Bravado Banshee 900R', speed: 91, accel: 88, braking: 76, handling: 74, price: '$1,050,000', class: 'Sports' },
    { name: 'Annis Euros', speed: 85, accel: 84, braking: 77, handling: 79, price: '$1,800,000', class: 'Sports' },
    { name: 'Karin Sultan RS', speed: 82, accel: 80, braking: 79, handling: 85, price: '$795,000', class: 'Sports' },
];

function populateSelects() {
    const s1 = document.getElementById('v1-select');
    const s2 = document.getElementById('v2-select');
    vehicles.forEach((v, i) => {
        s1.innerHTML += `<option value="${i}">${v.name} (${v.class})</option>`;
        s2.innerHTML += `<option value="${i}">${v.name} (${v.class})</option>`;
    });
}

function renderVehicle(cardId, chartId, nameId, specsId, vIdx) {
    const v = vehicles[vIdx];
    document.getElementById(nameId).textContent = v.name;

    const labels = ['Speed', 'Accel', 'Braking', 'Handling'];
    const vals = [v.speed, v.accel, v.braking, v.handling];
    const maxVal = 100;

    document.getElementById(specsId).innerHTML = `
        <div class="spec"><span class="label">Class</span><span class="value">${v.class}</span></div>
        <div class="spec"><span class="label">Price</span><span class="value">${v.price}</span></div>
    `;

    let chartHtml = '';
    labels.forEach((l, i) => {
        const pct = (vals[i] / maxVal) * 100;
        chartHtml += `
            <div class="bar-row">
                <span class="bar-label">${l}</span>
                <div class="bar-track">
                    <div class="bar-fill c1" style="width:${pct}%"></div>
                </div>
                <span class="bar-val">${vals[i]}</span>
            </div>
        `;
    });
    document.getElementById(chartId).innerHTML = chartHtml;
}

function compare() {
    const i1 = parseInt(document.getElementById('v1-select').value);
    const i2 = parseInt(document.getElementById('v2-select').value);
    if (isNaN(i1) || isNaN(i2)) return;

    renderVehicle('v1-specs', 'v1-chart', 'v1-name', 'v1-specs', i1);
    renderVehicle('v2-specs', 'v2-chart', 'v2-name', 'v2-specs', i2);

    // Highlight winner stats
    const v1 = vehicles[i1], v2 = vehicles[i2];
    ['speed','accel','braking','handling'].forEach(attr => {
        const val1 = v1[attr], val2 = v2[attr];
        if (val1 > val2) {
            document.querySelector(`#v1-specs .spec:nth-child(${['speed','accel','braking','handling'].indexOf(attr)+2}) .value`).classList.add('winner');
        } else if (val2 > val1) {
            document.querySelector(`#v2-specs .spec:nth-child(${['speed','accel','braking','handling'].indexOf(attr)+2}) .value`).classList.add('winner');
        }
    });
}

populateSelects();
document.getElementById('v1-select').addEventListener('change', compare);
document.getElementById('v2-select').addEventListener('change', compare);
</script>
</body>
</html>
